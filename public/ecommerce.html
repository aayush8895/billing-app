<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Bill — Billing App</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><a href="/index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;"><span class="dot"></span> Billing App</a></div>
  <div class="who"><a class="btn sm" href="/index.html">← Dashboard</a></div>
</div>

<div class="wrap">
  <div class="editor-bar">
    <input class="name-input" id="billName" placeholder="Bill name (e.g. Order #12345)">
    <span class="save-state" id="saveState"></span>
    <input type="file" id="scanInput" accept="image/*,application/pdf" hidden>
    <select id="aiModel" class="ai-model" title="AI model used for receipt scanning">
      <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
      <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemma-4-31b-it">Gemma 4 31B</option>
    </select>
    <button class="btn" id="scanBtn" onclick="document.getElementById('scanInput').click()">📷 Scan receipt/PDF (AI)</button>
    <button class="btn primary" id="saveBtn" onclick="saveBill()">💾 Save</button>
    <button class="btn" id="copyBtn" onclick="saveAsCopy()">⧉ Save as copy</button>
    <button class="btn" onclick="downloadPdf(this)">⬇ PDF</button>
  </div>

  <div class="editor">
    <div class="card form-col">
      <div class="sec-head">Select Template</div>
      <div class="templates" id="tpls">
        <div class="tpl active" data-t="1"><b>Template 1</b><span>Tax Invoice</span></div>
        <div class="tpl" data-t="2"><b>Template 2</b><span>Simple</span></div>
      </div>

      <div class="sec-head">Seller Details</div>
      <div class="field"><label>Seller / Sold By <span class="req">*</span></label><input id="sellerName" placeholder="Company / store name"></div>
      <div class="field"><label>Seller Address</label><textarea id="sellerAddr"></textarea></div>
      <div class="field"><label>Seller GSTIN</label><input id="sellerGstin"></div>

      <div class="sec-head">Order &amp; Invoice</div>
      <div class="row">
        <div class="field"><label>Order ID</label><input id="orderId"></div>
        <div class="field"><label>Invoice No</label><input id="invoice"></div>
      </div>
      <div class="row">
        <div class="field"><label>Invoice Date</label><input type="date" id="invoiceDate"></div>
        <div class="field"><label>Place of Supply</label><input id="placeOfSupply" placeholder="e.g. Delhi"></div>
      </div>

      <div class="sec-head">Bill To</div>
      <div class="field"><label>Billing Name</label><input id="billToName"></div>
      <div class="field"><label>Billing Address</label><textarea id="billToAddr"></textarea></div>

      <div class="sec-head">Ship To (optional)</div>
      <div class="field"><label>Shipping Name</label><input id="shipToName"></div>
      <div class="field"><label>Shipping Address</label><textarea id="shipToAddr"></textarea></div>

      <div class="sec-head">Items</div>
      <table class="items"><thead><tr><th>Item</th><th class="col-qty">Qty</th><th class="col-rate">Rate</th><th class="col-amt">Amount</th><th></th></tr></thead><tbody id="items"></tbody></table>
      <div class="actions" style="margin-top:14px;"><button class="btn" id="addItem">+ Add Item</button></div>

      <div class="sec-head">Payment &amp; Tax</div>
      <div class="field"><label>Payment Mode</label>
        <select id="paymentMode"><option></option><option>PREPAID</option><option>COD</option><option>CARD</option><option>UPI</option><option>NET BANKING</option></select>
      </div>
      <div class="row3">
        <div class="field"><label>SGST %</label><input id="sgstRate" type="number" value="0" min="0" step="0.5"></div>
        <div class="field"><label>CGST %</label><input id="cgstRate" type="number" value="0" min="0" step="0.5"></div>
        <div class="field"><label>IGST %</label><input id="igstRate" type="number" value="0" min="0" step="0.5"></div>
      </div>
      <div class="field"><label><input type="checkbox" id="applyTax" checked> Apply GST (use IGST for inter-state, or CGST+SGST for intra-state)</label></div>
      <div class="field"><label>Footer message</label><input id="footMsg" value="This is a computer-generated invoice."></div>
    </div>

    <div class="preview-col">
      <div class="card" style="position:relative;">
        <div class="ai-overlay" id="aiOverlay" style="display:none;">
          <div class="big-spin"></div>
          <div class="t" id="aiOverlayTitle">Reading your receipt…</div>
          <div class="s" id="aiOverlaySub">Extracting details with AI</div>
        </div>
        <div class="pv-head"><h2>Live Preview</h2><span class="pill">Preview</span></div>
        <div class="receipt" id="receipt"></div>
        <div class="foot-note" style="text-align:center;color:var(--muted);font-size:11px;margin-top:12px;">Saved on the server as a file. Edit anytime.</div>
      </div>
    </div>
  </div>
</div>

<script src="/js/ecommerce.js"></script>
<script src="/js/editor-core.js"></script>
</body>
</html>
